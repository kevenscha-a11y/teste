openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Course Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: courses
    description: Course management
  - name: sections
    description: Section management
  - name: lessons
    description: Lesson management
  - name: enrollments
    description: Enrollment management
  - name: progress
    description: Progress tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /courses:
    get:
      operationId: getCourses
      tags: [courses]
      summary: List all published courses
      responses:
        "200":
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseWithProgress"

  /courses/admin:
    get:
      operationId: getAdminCourses
      tags: [courses]
      summary: List all courses (admin)
      responses:
        "200":
          description: List of all courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseWithStats"

  /courses/{id}:
    get:
      operationId: getCourse
      tags: [courses]
      summary: Get a single course with sections and lessons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateCourse
      tags: [courses]
      summary: Update a course (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCourseRequest"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

    delete:
      operationId: deleteCourse
      tags: [courses]
      summary: Delete a course (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /courses/create:
    post:
      operationId: createCourse
      tags: [courses]
      summary: Create a new course (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourseRequest"
      responses:
        "201":
          description: Created course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"

  /courses/{courseId}/sections:
    get:
      operationId: getCourseSections
      tags: [sections]
      summary: Get sections for a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SectionWithLessons"

    post:
      operationId: createSection
      tags: [sections]
      summary: Create a section (admin)
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSectionRequest"
      responses:
        "201":
          description: Created section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

  /sections/{id}:
    patch:
      operationId: updateSection
      tags: [sections]
      summary: Update a section (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSectionRequest"
      responses:
        "200":
          description: Updated section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

    delete:
      operationId: deleteSection
      tags: [sections]
      summary: Delete a section (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sections/{sectionId}/lessons:
    post:
      operationId: createLesson
      tags: [lessons]
      summary: Create a lesson in a section (admin)
      parameters:
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonRequest"
      responses:
        "201":
          description: Created lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

  /lessons/{id}:
    patch:
      operationId: updateLesson
      tags: [lessons]
      summary: Update a lesson (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLessonRequest"
      responses:
        "200":
          description: Updated lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

    delete:
      operationId: deleteLesson
      tags: [lessons]
      summary: Delete a lesson (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /courses/{courseId}/enroll:
    post:
      operationId: enrollCourse
      tags: [enrollments]
      summary: Enroll in a course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"
        "400":
          description: Already enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /enrollments:
    get:
      operationId: getEnrollments
      tags: [enrollments]
      summary: Get enrolled courses for current user
      responses:
        "200":
          description: Enrolled courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnrollmentWithCourse"

  /progress/{lessonId}:
    post:
      operationId: markLessonComplete
      tags: [progress]
      summary: Mark a lesson as complete
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonProgress"

    delete:
      operationId: markLessonIncomplete
      tags: [progress]
      summary: Mark a lesson as incomplete
      parameters:
        - name: lessonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Progress updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /courses/{courseId}/progress:
    get:
      operationId: getCourseProgress
      tags: [progress]
      summary: Get course progress for current user
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Course progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseProgress"

  /certificates/{courseId}:
    get:
      operationId: getCertificate
      tags: [progress]
      summary: Get certificate for completed course
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Certificate data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
        "404":
          description: Not completed yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, student]
      required:
        - id
        - name
        - email
        - role

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    Course:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        isPublished:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - thumbnailUrl
        - isPublished
        - createdAt

    CourseWithProgress:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        isPublished:
          type: boolean
        createdAt:
          type: string
        totalLessons:
          type: integer
        isEnrolled:
          type: boolean
        progressPercent:
          type: number
      required:
        - id
        - title
        - description
        - thumbnailUrl
        - isPublished
        - createdAt
        - totalLessons
        - isEnrolled
        - progressPercent

    CourseWithStats:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        isPublished:
          type: boolean
        createdAt:
          type: string
        totalLessons:
          type: integer
        totalSections:
          type: integer
        totalStudents:
          type: integer
      required:
        - id
        - title
        - description
        - thumbnailUrl
        - isPublished
        - createdAt
        - totalLessons
        - totalSections
        - totalStudents

    CourseDetail:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        isPublished:
          type: boolean
        createdAt:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/SectionWithLessons"
        isEnrolled:
          type: boolean
        progressPercent:
          type: number
        completedLessons:
          type: array
          items:
            type: integer
      required:
        - id
        - title
        - description
        - thumbnailUrl
        - isPublished
        - createdAt
        - sections
        - isEnrolled
        - progressPercent
        - completedLessons

    Section:
      type: object
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        orderIndex:
          type: integer
      required:
        - id
        - courseId
        - title
        - orderIndex

    SectionWithLessons:
      type: object
      properties:
        id:
          type: integer
        courseId:
          type: integer
        title:
          type: string
        orderIndex:
          type: integer
        lessons:
          type: array
          items:
            $ref: "#/components/schemas/Lesson"
      required:
        - id
        - courseId
        - title
        - orderIndex
        - lessons

    Lesson:
      type: object
      properties:
        id:
          type: integer
        sectionId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        duration:
          type: ["integer", "null"]
        orderIndex:
          type: integer
      required:
        - id
        - sectionId
        - title
        - description
        - videoUrl
        - duration
        - orderIndex

    CreateCourseRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        isPublished:
          type: boolean
      required:
        - title
        - description

    UpdateCourseRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        isPublished:
          type: boolean

    CreateSectionRequest:
      type: object
      properties:
        title:
          type: string
        orderIndex:
          type: integer
      required:
        - title

    UpdateSectionRequest:
      type: object
      properties:
        title:
          type: string
        orderIndex:
          type: integer

    CreateLessonRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        duration:
          type: ["integer", "null"]
        orderIndex:
          type: integer
      required:
        - title

    UpdateLessonRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        duration:
          type: ["integer", "null"]
        orderIndex:
          type: integer

    Enrollment:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        courseId:
          type: integer
        enrolledAt:
          type: string
      required:
        - id
        - userId
        - courseId
        - enrolledAt

    EnrollmentWithCourse:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        courseId:
          type: integer
        enrolledAt:
          type: string
        course:
          $ref: "#/components/schemas/CourseWithProgress"
      required:
        - id
        - userId
        - courseId
        - enrolledAt
        - course

    LessonProgress:
      type: object
      properties:
        lessonId:
          type: integer
        userId:
          type: integer
        completedAt:
          type: string
      required:
        - lessonId
        - userId
        - completedAt

    CourseProgress:
      type: object
      properties:
        courseId:
          type: integer
        totalLessons:
          type: integer
        completedLessons:
          type: integer
        progressPercent:
          type: number
        completedLessonIds:
          type: array
          items:
            type: integer
        isCompleted:
          type: boolean
      required:
        - courseId
        - totalLessons
        - completedLessons
        - progressPercent
        - completedLessonIds
        - isCompleted

    Certificate:
      type: object
      properties:
        studentName:
          type: string
        courseName:
          type: string
        completedAt:
          type: string
        courseId:
          type: integer
      required:
        - studentName
        - courseName
        - completedAt
        - courseId
